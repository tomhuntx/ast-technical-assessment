<p-card class="profile-card">
  <ng-template pTemplate="header">
    <div class="profile-header">
      <p-avatar
        [image]="profile.profilePicture"
        size="xlarge"
        shape="circle"
      ></p-avatar>
      <h2>{{ profile.name }}</h2>
    </div>
  </ng-template>

  <p><strong>Email:</strong> {{ profile.email }}</p>
  <p><strong>Phone:</strong> {{ profile.phone }}</p>

  <h3>Recent Posts</h3>

  <div class="posts">
    @for (post of profile.posts; track post) {
      <p-card class="post">
        <img [src]="post.image" />
        <p>{{ post.text }}</p>
      </p-card>
    }
  </div>

  <button
    pButton
    label="Logout"
    icon="pi pi-sign-out"
    class="p-button-danger logout"
    (click)="logout()"
  ></button>
</p-card>
